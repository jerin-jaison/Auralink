services:
  # Web Service
  - type: web
    name: auralink-web
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: auralink-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: ALLOWED_HOSTS
        value: '*'
      - key: STORAGE_TYPE
        value: local
      - key: REDIS_URL
        sync: false # Set this in Dashboard if using external Redis

  # Celery Worker
  - type: worker
    name: auralink-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: auralink-db
          property: connectionString

databases:
  - name: auralink-db
    plan: free # Note: Render free DBs expire after 90 days.
