services:
  # Web Service
  - type: web
    name: auralink-web
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: auralink-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: ALLOWED_HOSTS
        value: '*'
      - key: STORAGE_TYPE
        value: local
      - key: REDIS_URL
        sync: false # Set this in Dashboard if using a paid Redis service
      # Celery broker: falls back to the Postgres DB if REDIS_URL is not set.
      # This lets the web process dispatch tasks without a separate Redis instance.
      # If you add a Redis service, override CELERY_BROKER_URL with the redis:// URL.
      - key: CELERY_BROKER_URL
        sync: false # Set in Dashboard, e.g. redis://<host>:<port>/0

  # Celery Worker (only useful when CELERY_BROKER_URL / REDIS_URL is configured)
  - type: worker
    name: auralink-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: auralink-db
          property: connectionString
      - key: CELERY_BROKER_URL
        sync: false # Must match the web service

databases:
  - name: auralink-db
    plan: free # Note: Render free DBs expire after 90 days.
